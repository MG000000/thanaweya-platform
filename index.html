<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة ثورة تعليمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#1a237e;--primary-light:#3949ab;--accent:#ffc107;--success:#4caf50;--danger:#f44336;--bg:#f0f2f5;--card:#fff;--text:#333;--light:#666;--border:#e0e0e0;--shadow:0 2px 15px rgba(0,0,0,0.1);--r:15px;--rs:10px;--t:all 0.3s ease}
        body{font-family:'Cairo',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);line-height:1.6}
        .hidden{display:none !important}
        .auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%)}
        .auth-box{background:#fff;border-radius:var(--r);padding:40px;width:100%;max-width:450px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .auth-box h1{color:var(--primary);text-align:center;margin-bottom:10px;font-size:1.8rem}
        .auth-box .subtitle{color:var(--light);text-align:center;margin-bottom:30px;font-size:0.95rem}
        .form-group{margin-bottom:20px}
        .form-group label{display:block;color:var(--text);font-weight:600;margin-bottom:8px;font-size:0.95rem}
        .form-group input,.form-group select{width:100%;padding:14px 18px;border:2px solid var(--border);border-radius:var(--rs);font-size:1rem;font-family:'Cairo',sans-serif;transition:var(--t)}
        .form-group input:focus,.form-group select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,35,126,0.1)}
        .btn-primary{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);color:#fff;border:none;padding:16px;width:100%;border-radius:var(--rs);font-size:1.1rem;font-family:'Cairo',sans-serif;font-weight:700;cursor:pointer;transition:var(--t);margin-top:10px}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(26,35,126,0.3)}
        .btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none}
        .auth-link{text-align:center;margin-top:20px;color:var(--light)}
        .auth-link a{color:var(--primary);text-decoration:none;font-weight:700}
        .error{color:var(--danger);font-size:0.85rem;margin-top:5px;text-align:center;display:none}
        .success{color:var(--success);font-size:0.85rem;margin-top:5px;text-align:center;display:none}
        .loading{text-align:center;margin-top:15px;display:none}
        .spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;display:inline-block}
        @keyframes spin{to{transform:rotate(360deg)}}
        .navbar{background:var(--primary);color:#fff;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
        .navbar h1{font-size:1.3rem}
        .navbar .user{display:flex;align-items:center;gap:15px}
        .btn-logout{background:rgba(255,255,255,0.2);color:#fff;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-family:'Cairo',sans-serif;transition:var(--t)}
        .btn-logout:hover{background:rgba(255,255,255,0.3)}
        .container{max-width:1200px;margin:0 auto;padding:30px}
        .welcome{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);color:#fff;padding:30px;border-radius:var(--r);margin-bottom:30px;box-shadow:0 4px 15px rgba(0,0,0,0.15)}
        .welcome h2{font-size:1.5rem;margin-bottom:10px}
        .status-badge{display:inline-block;padding:5px 15px;border-radius:20px;font-size:0.85rem;font-weight:600;margin-top:10px}
        .status-pending{background:var(--accent);color:#333}
        .status-active{background:var(--success);color:#fff}
        .status-admin{background:#9c27b0;color:#fff}
        .selection{background:var(--card);border-radius:var(--r);padding:30px;margin-bottom:30px;box-shadow:var(--shadow)}
        .selection h3{color:var(--primary);margin-bottom:20px}
        .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
        .btn-search{background:var(--primary);color:#fff;border:none;padding:15px 40px;border-radius:var(--rs);cursor:pointer;font-family:'Cairo',sans-serif;font-weight:700;font-size:1rem;margin-top:20px;transition:var(--t)}
        .btn-search:hover{background:var(--primary-light);transform:translateY(-2px)}
        .teachers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
        .teacher-card{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);transition:var(--t);cursor:pointer}
        .teacher-card:hover{transform:translateY(-5px);box-shadow:0 8px 25px rgba(0,0,0,0.15)}
        .teacher-header{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);color:#fff;padding:20px;position:relative}
        .teacher-name{font-weight:700;font-size:1.1rem}
        .teacher-subject{font-size:0.9rem;opacity:0.9}
        .teacher-rating{position:absolute;left:15px;top:50%;transform:translateY(-50%);background:var(--accent);color:#333;padding:5px 12px;border-radius:20px;font-weight:700;font-size:0.85rem}
        .teacher-body{padding:20px}
        .teacher-info{display:flex;align-items:center;gap:8px;margin-bottom:8px;color:var(--light);font-size:0.9rem}
        .teacher-stats{display:flex;gap:10px;margin-top:15px;padding-top:15px;border-top:2px solid var(--bg)}
        .stat{text-align:center;flex:1;padding:10px;background:var(--bg);border-radius:var(--rs)}
        .stat-value{font-weight:800;color:var(--primary);font-size:1.1rem}
        .stat-label{font-size:0.75rem;color:var(--light)}
        .btn-videos{background:var(--success);color:#fff;border:none;padding:10px 20px;border-radius:var(--rs);cursor:pointer;font-family:'Cairo',sans-serif;font-weight:600;width:100%;margin-top:15px}
        .btn-videos:hover{background:#45a049}
        .videos-section{display:none;background:var(--card);border-radius:var(--r);padding:25px;margin-top:20px;box-shadow:var(--shadow)}
        .videos-section.active{display:block}
        .videos-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .btn-close{background:var(--danger);color:#fff;border:none;padding:8px 16px;border-radius:var(--rs);cursor:pointer;font-family:'Cairo',sans-serif}
        .videos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
        .video-card{border-radius:var(--rs);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
        .video-wrapper{position:relative;padding-bottom:56.25%;height:0;background:#000}
        .video-wrapper iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
        .video-info{padding:15px}
        .video-title{font-weight:600;font-size:0.9rem}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}
        .stat-card{background:var(--card);padding:20px;border-radius:var(--r);box-shadow:var(--shadow);text-align:center}
        .stat-card .value{font-size:2rem;font-weight:800;color:var(--primary)}
        .stat-card .label{color:var(--light);font-size:0.9rem}
        .section-card{background:var(--card);border-radius:var(--r);padding:25px;margin-bottom:20px;box-shadow:var(--shadow)}
        .section-card h3{color:var(--primary);margin-bottom:15px;font-size:1.2rem}
        table{width:100%;border-collapse:collapse}
        th,td{padding:12px;text-align:right;border-bottom:1px solid #eee}
        th{background:var(--bg);color:var(--primary);font-weight:700}
        tr:hover{background:#f9f9f9}
        .badge{padding:5px 12px;border-radius:20px;font-size:0.8rem;font-weight:600}
        .badge-student{background:#e3f2fd;color:#1565c0}
        .badge-teacher{background:#fff3e0;color:#e65100}
        .badge-admin{background:#f3e5f5;color:#7b1fa2}
        .badge-pending{background:#ffebee;color:#c62828}
        .badge-active{background:#e8f5e9;color:#2e7d32}
        .btn-small{padding:6px 12px;border:none;border-radius:6px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:0.8rem;margin:2px}
        .btn-approve{background:var(--success);color:#fff}
        .btn-reject{background:var(--danger);color:#fff}
        .btn-delete{background:#757575;color:#fff}
        .video-list{display:grid;gap:10px}
        .video-item{background:#f9f9f9;padding:15px;border-radius:var(--rs);display:flex;justify-content:space-between;align-items:center}
        .video-item .title{font-weight:600}
        .video-item .url{color:var(--light);font-size:0.8rem}
        .btn-add{background:var(--success);color:#fff;border:none;padding:10px 20px;border-radius:var(--rs);cursor:pointer;font-family:'Cairo',sans-serif;margin-bottom:15px}
        .alert{padding:15px;border-radius:var(--rs);margin-bottom:20px}
        .alert-warning{background:#fff3e0;color:#e65100}
        .alert-success{background:#e8f5e9;color:#2e7d32}
        .no-results{text-align:center;padding:40px;color:var(--light)}
        .no-results-icon{font-size:3rem;margin-bottom:10px}
        @media(max-width:768px){.navbar{flex-direction:column;gap:10px}.form-grid{grid-template-columns:1fr}.teachers-grid,.videos-grid{grid-template-columns:1fr}}
    </style>
<base target="_blank">
</head>
<body>
    <div id="page-login" class="auth-page">
        <div class="auth-box">
            <h1>📚 تسجيل الدخول</h1>
            <p class="subtitle">أهلاً بك في منصة ثورة تعليمية</p>
            <form id="loginForm">
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="loginPassword" placeholder="********" required>
                </div>
                <button type="submit" class="btn-primary" id="btnLogin">تسجيل الدخول</button>
                <div class="loading" id="loginLoading"><div class="spinner"></div><p style="margin-top:10px;color:#666">جاري تسجيل الدخول...</p></div>
                <div class="error" id="loginError"></div>
            </form>
            <div class="auth-link">مش عندك حساب؟ <a href="javascript:void(0)" onclick="event.preventDefault(); showPage('register')">إنشاء حساب جديد</a></div>
            <div style="text-align:center;margin-top:15px">
                <button onclick="loginAsAdmin()" style="background:#9c27b0;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-family:'Cairo',sans-serif">🔐 دخول كأدمن</button>
            </div>
        </div>
    </div>

    <div id="page-register" class="auth-page hidden">
        <div class="auth-box">
            <h1>📚 إنشاء حساب جديد</h1>
            <p class="subtitle">انضم لمنصة ثورة تعليمية مجاناً</p>
            <form id="registerForm">
                <div class="form-group">
                    <label>الاسم الكامل</label>
                    <input type="text" id="regName" placeholder="اكتب اسمك الكامل" required>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="regEmail" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="regPassword" placeholder="6 أحرف على الأقل" required minlength="6">
                </div>
                <div class="form-group">
                    <label>نوع الحساب</label>
                    <select id="regRole" required>
                        <option value="">-- اختر نوع الحساب --</option>
                        <option value="student">🎓 طالب</option>
                        <option value="teacher">👨‍🏫 مدرس</option>
                    </select>
                </div>
                <div class="form-group hidden" id="teacherFields">
                    <label>المادة التي تدرسها</label>
                    <select id="regSubject">
                        <option value="">-- اختر المادة --</option>
                        <option value="رياضيات">رياضيات</option>
                        <option value="فيزياء">فيزياء</option>
                        <option value="كيمياء">كيمياء</option>
                        <option value="أحياء">أحياء</option>
                        <option value="تاريخ">تاريخ</option>
                        <option value="جغرافيا">جغرافيا</option>
                        <option value="فلسفة">فلسفة</option>
                        <option value="علم نفس">علم نفس</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary" id="btnRegister">إنشاء حساب</button>
                <div class="loading" id="regLoading"><div class="spinner"></div><p style="margin-top:10px;color:#666">جاري إنشاء الحساب...</p></div>
                <div class="error" id="regError"></div>
                <div class="success" id="regSuccess"></div>
            </form>
            <div class="auth-link">عندك حساب بالفعل؟ <a href="javascript:void(0)" onclick="event.preventDefault(); showPage('login')">سجل دخول من هنا</a></div>
        </div>
    </div>

    <div id="page-app" class="hidden">
        <nav class="navbar">
            <h1>📚 منصة ثورة تعليمية</h1>
            <div class="user">
                <span id="userName">مستخدم</span>
                <span id="userRole" class="badge"></span>
                <button class="btn-logout" onclick="logout()">🚪 خروج</button>
            </div>
        </nav>
        <div class="container" id="appContent"></div>
    </div>

    <script>
        // ==================== LOCAL DATABASE ====================
        const DB = {
            getUsers() { return JSON.parse(localStorage.getItem('users') || '[]'); },
            saveUsers(users) { localStorage.setItem('users', JSON.stringify(users)); },
            getTeachers() { return JSON.parse(localStorage.getItem('teachers') || '[]'); },
            saveTeachers(teachers) { localStorage.setItem('teachers', JSON.stringify(teachers)); },
            getCurrentUser() { return JSON.parse(localStorage.getItem('currentUser') || 'null'); },
            setCurrentUser(user) { localStorage.setItem('currentUser', JSON.stringify(user)); },
            clearCurrentUser() { localStorage.removeItem('currentUser'); }
        };

        // ==================== DEFAULT DATA ====================
        function initData() {
            let users = DB.getUsers();

            // Check if admin exists, if not clear and re-init
            const adminExists = users.find(u => u.email === 'admin@thawra.edu');
            if (!adminExists) {
                console.log('Admin not found, clearing data...');
                localStorage.removeItem('users');
                localStorage.removeItem('teachers');
                users = [];
            }

            if (users.length === 0) {
                // Add default admin
                users.push({
                    id: 'admin001',
                    fullName: 'مدير المنصة',
                    email: 'admin@thawra.edu',
                    password: 'mostafa@123',
                    role: 'admin',
                    createdAt: new Date().toISOString(),
                    status: 'active'
                });

                // Add sample students
                users.push({
                    id: 'student001',
                    fullName: 'أحمد محمد',
                    email: 'ahmed@student.com',
                    password: '123456',
                    role: 'student',
                    createdAt: new Date().toISOString(),
                    status: 'active'
                });
                users.push({
                    id: 'student002',
                    fullName: 'محمد علي',
                    email: 'mohamed@student.com',
                    password: '123456',
                    role: 'student',
                    createdAt: new Date().toISOString(),
                    status: 'active'
                });

                // Add sample teachers (approved)
                users.push({
                    id: 'teacher001',
                    fullName: 'أ/ أحمد سرور',
                    email: 'ahmed@teacher.com',
                    password: '123456',
                    role: 'teacher',
                    subject: 'رياضيات',
                    approved: true,
                    status: 'active',
                    region: 'cairo',
                    regionName: 'القاهرة',
                    year: 'first',
                    branch: 'scientific',
                    experience: 'خبرة 15 سنة',
                    rating: 4.9,
                    students: 940,
                    videos: [
                        {title: "تقسيم قطعة مستقيمة", embed: "https://www.youtube.com/embed/ARZjVbVFn1w"},
                        {title: "مراجعة حساب مثلثات", embed: "https://www.youtube.com/embed/HpVsGw3O0dQ"}
                    ],
                    createdAt: new Date().toISOString()
                });

                users.push({
                    id: 'teacher002',
                    fullName: 'أ/ محمد عبدالمعبود',
                    email: 'mohamed@teacher.com',
                    password: '123456',
                    role: 'teacher',
                    subject: 'فيزياء',
                    approved: true,
                    status: 'active',
                    region: 'alex',
                    regionName: 'الإسكندرية',
                    year: 'first',
                    branch: 'scientific',
                    experience: 'خبرة 12 سنة',
                    rating: 4.8,
                    students: 1350,
                    videos: [
                        {title: "First Physics Lecture", embed: "https://www.youtube.com/embed/9xnaMi44J6U"}
                    ],
                    createdAt: new Date().toISOString()
                });

                // Add pending teacher
                users.push({
                    id: 'teacher003',
                    fullName: 'د/ سامح إبراهيم',
                    email: 'sameh@teacher.com',
                    password: '123456',
                    role: 'teacher',
                    subject: 'كيمياء',
                    approved: false,
                    status: 'pending',
                    region: 'online',
                    regionName: 'أونلاين',
                    year: 'first',
                    branch: 'scientific',
                    experience: 'خبرة 10 سنوات',
                    rating: 0,
                    students: 0,
                    videos: [],
                    createdAt: new Date().toISOString()
                });

                DB.saveUsers(users);

                // Save approved teachers to teachers collection
                const teachers = users.filter(u => u.role === 'teacher');
                DB.saveTeachers(teachers);
            }
        }

        // Initialize data on first load
        initData();

        // Debug: log current data
        console.log('Users:', DB.getUsers());
        console.log('Teachers:', DB.getTeachers());

        let currentUser = null, userRole = null, userData = null;

        function showPage(page) {
            document.querySelectorAll('.auth-page').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-app').classList.add('hidden');
            if (page === 'login') document.getElementById('page-login').classList.remove('hidden');
            else if (page === 'register') document.getElementById('page-register').classList.remove('hidden');
            else if (page === 'app') document.getElementById('page-app').classList.remove('hidden');
        }

        function checkAuth() {
            // Force init data if empty
            const users = DB.getUsers();
            if (users.length === 0) {
                console.log('No users found, initializing...');
                initData();
            }

            const user = DB.getCurrentUser();
            if (user) { currentUser = user; userRole = user.role; userData = user; showPage('app'); loadDashboard(); }
            else showPage('login');
        }

        // ==================== LOGIN ====================
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnLogin'), loading = document.getElementById('loginLoading'), error = document.getElementById('loginError');
            btn.disabled = true; loading.style.display = 'block'; error.style.display = 'none';

            // Ensure data exists
            let users = DB.getUsers();
            if (users.length === 0) {
                initData();
                users = DB.getUsers();
            }

            const email = document.getElementById('loginEmail').value, password = document.getElementById('loginPassword').value;
            console.log('Trying login:', email, password);
            console.log('Available users:', users.map(u => ({email: u.email, role: u.role})));

            const user = users.find(u => u.email === email && u.password === password);
            if (user) { DB.setCurrentUser(user); currentUser = user; userRole = user.role; userData = user; showPage('app'); loadDashboard(); }
            else { error.textContent = 'البريد أو كلمة المرور غير صحيحة (المستخدمين: ' + users.length + ')'; error.style.display = 'block'; btn.disabled = false; loading.style.display = 'none'; }
        });

        // ==================== ADMIN LOGIN ====================
        function loginAsAdmin() {
            // Force init data
            initData();

            const users = DB.getUsers();
            console.log('All users after init:', users);

            const admin = users.find(u => u.email === 'admin@thawra.edu');
            if (admin) {
                DB.setCurrentUser(admin);
                currentUser = admin;
                userRole = admin.role;
                userData = admin;
                showPage('app');
                loadDashboard();
            } else {
                alert('خطأ: الأدمن مش موجود! المستخدمين: ' + users.length);
            }
        }

        // ==================== REGISTER ====================
        document.getElementById('regRole').addEventListener('change', function() {
            document.getElementById('teacherFields').classList.toggle('hidden', this.value !== 'teacher');
        });

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnRegister'), loading = document.getElementById('regLoading'), error = document.getElementById('regError'), success = document.getElementById('regSuccess');
            btn.disabled = true; loading.style.display = 'block'; error.style.display = 'none'; success.style.display = 'none';
            const email = document.getElementById('regEmail').value, password = document.getElementById('regPassword').value, role = document.getElementById('regRole').value;
            const users = DB.getUsers();
            if (users.find(u => u.email === email)) { error.textContent = 'البريد الإلكتروني مستخدم بالفعل'; error.style.display = 'block'; btn.disabled = false; loading.style.display = 'none'; return; }
            const newUser = { id: Date.now().toString(), fullName: document.getElementById('regName').value, email, password, role, createdAt: new Date().toISOString(), status: role === 'teacher' ? 'pending' : 'active' };
            if (role === 'teacher') {
                newUser.subject = document.getElementById('regSubject').value;
                newUser.approved = false; newUser.rating = 0; newUser.students = 0; newUser.experience = ''; newUser.videos = [];
                newUser.region = 'cairo'; newUser.regionName = 'القاهرة'; newUser.year = 'first'; newUser.branch = 'scientific';
            }
            users.push(newUser); DB.saveUsers(users);
            if (role === 'teacher') { const teachers = DB.getTeachers(); teachers.push(newUser); DB.saveTeachers(teachers); }
            success.textContent = role === 'teacher' ? 'تم إنشاء الحساب! بانتظار موافقة الأدمن...' : 'تم إنشاء الحساب بنجاح!';
            success.style.display = 'block';
            setTimeout(() => showPage('login'), 2000);
        });

        function logout() { DB.clearCurrentUser(); currentUser = null; userRole = null; userData = null; showPage('login'); }

        function loadDashboard() {
            document.getElementById('userName').textContent = userData.fullName || 'مستخدم';
            const roleBadge = document.getElementById('userRole');
            roleBadge.textContent = userRole === 'admin' ? 'أدمن' : userRole === 'teacher' ? 'مدرس' : 'طالب';
            roleBadge.className = 'badge badge-' + (userRole === 'admin' ? 'admin' : userRole);
            const content = document.getElementById('appContent');
            if (userRole === 'admin') loadAdminDashboard(content);
            else if (userRole === 'teacher') loadTeacherDashboard(content);
            else loadStudentDashboard(content);
        }

        // ==================== STUDENT ====================
        function loadStudentDashboard(container) {
            container.innerHTML = `
                <div class="welcome"><h2>👋 أهلاً بيك، ${userData.fullName}!</h2><p>اختار بياناتك واكتشف أفضل المدرسين</p></div>
                <div class="selection"><h3>🔍 اختر بياناتك الدراسية</h3>
                    <div class="form-grid">
                        <div class="form-group"><label>السنة الدراسية</label><select id="sYear"><option value="">-- اختر السنة --</option><option value="first">أولى ثانوي</option><option value="second">ثانية ثانوي</option><option value="third">ثالثة ثانوي</option></select></div>
                        <div class="form-group"><label>الشعبة</label><select id="sBranch"><option value="">-- اختر الشعبة --</option><option value="scientific">الشعبة العلمية</option><option value="literary">الشعبة الأدبية</option></select></div>
                        <div class="form-group"><label>المنطقة</label><select id="sRegion"><option value="">-- اختر المنطقة --</option><option value="cairo">القاهرة</option><option value="alex">الإسكندرية</option><option value="giza">الجيزة</option><option value="mansoura">المنصورة</option><option value="tanta">طنطا</option><option value="online">أونلاين</option></select></div>
                    </div>
                    <button class="btn-search" onclick="searchTeachers()">🔍 ابحث عن المدرسين</button>
                </div>
                <div id="studentResults"></div><div id="studentVideos" class="videos-section"></div>`;
        }

        function searchTeachers() {
            const year = document.getElementById('sYear').value, branch = document.getElementById('sBranch').value, region = document.getElementById('sRegion').value;
            if (!year || !branch || !region) { alert('يرجى اختيار السنة والشعبة والمنطقة'); return; }
            const teachers = DB.getTeachers().filter(t => t.approved && t.year === year && t.branch === branch && t.region === region);
            teachers.sort((a, b) => (b.rating || 0) - (a.rating || 0));
            const container = document.getElementById('studentResults');
            if (teachers.length === 0) { container.innerHTML = '<div class="no-results"><span class="no-results-icon">😕</span><p>لا يوجد مدرسين في هذه المنطقة</p></div>'; return; }
            container.innerHTML = '<h3 style="color:var(--primary);margin-bottom:20px">⭐ أفضل المدرسين</h3><div class="teachers-grid">' + 
                teachers.map(t => `
                    <div class="teacher-card" onclick="showTeacherVideos('${t.id}', '${t.fullName}', '${t.subject}')">
                        <div class="teacher-header"><div class="teacher-name">${t.fullName}</div><div class="teacher-subject">${t.subject}</div><div class="teacher-rating">⭐ ${t.rating || 0}</div></div>
                        <div class="teacher-body">
                            <div class="teacher-info">📍 ${t.regionName || t.region}</div>
                            <div class="teacher-info">⏱️ ${t.experience || '-'}</div>
                            <div class="teacher-info">👥 ${t.students || 0}K مشترك</div>
                            <button class="btn-videos" onclick="event.stopPropagation(); showTeacherVideos('${t.id}', '${t.fullName}', '${t.subject}')">🎬 مشاهدة الفيديوهات</button>
                        </div>
                    </div>`).join('') + '</div>';
        }

        function showTeacherVideos(id, name, subject) {
            const teachers = DB.getTeachers(), teacher = teachers.find(t => t.id === id);
            if (!teacher) return;
            const videos = teacher.videos || [];
            const container = document.getElementById('studentVideos');
            container.innerHTML = `
                <div class="videos-header"><h3>🎬 فيديوهات ${name} - ${subject}</h3><button class="btn-close" onclick="document.getElementById('studentVideos').classList.remove('active')">✕ إغلاق</button></div>
                <div class="videos-grid">${videos.map(v => `<div class="video-card"><div class="video-wrapper"><iframe src="${v.embed}" allowfullscreen></iframe></div><div class="video-info"><div class="video-title">${v.title}</div></div></div>`).join('')}</div>`;
            container.classList.add('active');
        }

        // ==================== TEACHER ====================
        function loadTeacherDashboard(container) {
            const isPending = !userData.approved;
            container.innerHTML = `
                <div class="welcome"><h2>👋 أهلاً بيك، ${userData.fullName}!</h2><p>إدارة بياناتك والفيديوهات</p>${isPending ? '<span class="status-badge status-pending">⏳ بانتظار الموافقة</span>' : '<span class="status-badge status-active">✅ حساب معتمد</span>'}</div>
                ${isPending ? '<div class="alert alert-warning">حسابك بانتظار موافقة الأدmin. لن تظهر في نتائج البحث حتى يتم الموافقة.</div>' : ''}
                <div class="stats-grid"><div class="stat-card"><div class="value" id="tVideoCount">0</div><div class="label">فيديوهات</div></div><div class="stat-card"><div class="value" id="tRating">0</div><div class="label">التقييم</div></div></div>
                <div class="section-card"><h3>👤 بياناتي</h3>
                    <form id="teacherProfileForm">
                        <div class="form-group"><label>المنطقة</label><select id="tRegion"><option value="cairo">القاهرة</option><option value="alex">الإسكندرية</option><option value="giza">الجيزة</option><option value="mansoura">المنصورة</option><option value="tanta">طنطا</option><option value="online">أونلاين</option></select></div>
                        <div class="form-group"><label>سنوات الخبرة</label><input type="text" id="tExperience" placeholder="مثال: 10 سنوات"></div>
                        <div class="form-group"><label>السنة الدراسية</label><select id="tYear"><option value="first">أولى ثانوي</option><option value="second">ثانية ثانوي</option><option value="third">ثالثة ثانوي</option></select></div>
                        <div class="form-group"><label>الشعبة</label><select id="tBranch"><option value="scientific">علمي</option><option value="literary">أدبي</option></select></div>
                        <button type="submit" class="btn-primary" style="width:auto;padding:12px 30px">💾 حفظ البيانات</button>
                    </form>
                </div>
                <div class="section-card"><h3>🎬 فيديوهاتي</h3><button class="btn-add" onclick="showAddVideoForm()">+ إضافة فيديو</button>
                    <div id="addVideoForm" class="hidden">
                        <div class="form-group"><label>عنوان الفيديو</label><input type="text" id="newVideoTitle" placeholder="عنوان الفيديو"></div>
                        <div class="form-group"><label>رابط YouTube Embed</label><input type="text" id="newVideoUrl" placeholder="https://www.youtube.com/embed/..."></div>
                        <button class="btn-primary" style="width:auto;padding:10px 20px;margin:5px" onclick="addVideo()">➕ إضافة</button><button class="btn-close" style="padding:10px 20px" onclick="hideAddVideoForm()">إلغاء</button>
                    </div>
                    <div class="video-list" id="teacherVideoList"></div>
                </div>`;
            document.getElementById('tRegion').value = userData.region || 'cairo';
            document.getElementById('tExperience').value = userData.experience || '';
            document.getElementById('tYear').value = userData.year || 'first';
            document.getElementById('tBranch').value = userData.branch || 'scientific';
            document.getElementById('teacherProfileForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const users = DB.getUsers(), userIndex = users.findIndex(u => u.id === currentUser.id);
                if (userIndex > -1) {
                    users[userIndex].region = document.getElementById('tRegion').value;
                    users[userIndex].regionName = getRegionName(document.getElementById('tRegion').value);
                    users[userIndex].experience = document.getElementById('tExperience').value;
                    users[userIndex].year = document.getElementById('tYear').value;
                    users[userIndex].branch = document.getElementById('tBranch').value;
                    DB.saveUsers(users);
                    const teachers = DB.getTeachers(), teacherIndex = teachers.findIndex(t => t.id === currentUser.id);
                    if (teacherIndex > -1) { teachers[teacherIndex] = {...teachers[teacherIndex], ...users[userIndex]}; DB.saveTeachers(teachers); }
                    DB.setCurrentUser(users[userIndex]); currentUser = users[userIndex]; userData = users[userIndex];
                    alert('✅ تم حفظ البيانات!');
                }
            });
            loadTeacherVideos();
        }

        function loadTeacherVideos() {
            const teachers = DB.getTeachers(), teacher = teachers.find(t => t.id === currentUser.id);
            if (!teacher) return;
            const videos = teacher.videos || [];
            document.getElementById('tVideoCount').textContent = videos.length;
            document.getElementById('tRating').textContent = teacher.rating || 0;
            const list = document.getElementById('teacherVideoList');
            list.innerHTML = videos.length === 0 ? '<p style="text-align:center;color:var(--light)">لا يوجد فيديوهات</p>' : 
                videos.map((v, i) => `<div class="video-item"><div><div class="title">${v.title}</div><div class="url">${v.embed}</div></div><button class="btn-small btn-delete" onclick="deleteVideo(${i})">🗑️ حذف</button></div>`).join('');
        }

        function showAddVideoForm() { document.getElementById('addVideoForm').classList.remove('hidden'); }
        function hideAddVideoForm() { document.getElementById('addVideoForm').classList.add('hidden'); }

        function addVideo() {
            const title = document.getElementById('newVideoTitle').value, url = document.getElementById('newVideoUrl').value;
            if (!title || !url) { alert('يرجى ملء جميع الحقول'); return; }
            const teachers = DB.getTeachers(), teacherIndex = teachers.findIndex(t => t.id === currentUser.id);
            if (teacherIndex > -1) {
                teachers[teacherIndex].videos = teachers[teacherIndex].videos || [];
                teachers[teacherIndex].videos.push({title, embed: url});
                DB.saveTeachers(teachers);
                const users = DB.getUsers(), userIndex = users.findIndex(u => u.id === currentUser.id);
                if (userIndex > -1) { users[userIndex].videos = teachers[teacherIndex].videos; DB.saveUsers(users); }
                loadTeacherVideos(); hideAddVideoForm(); alert('✅ تم إضافة الفيديو!');
            }
        }

        function deleteVideo(index) {
            if (!confirm('هل أنت متأكد؟')) return;
            const teachers = DB.getTeachers(), teacherIndex = teachers.findIndex(t => t.id === currentUser.id);
            if (teacherIndex > -1) { teachers[teacherIndex].videos.splice(index, 1); DB.saveTeachers(teachers); loadTeacherVideos(); }
        }

        // ==================== ADMIN ====================
        function loadAdminDashboard(container) {
            container.innerHTML = `
                <div class="welcome"><h2>⚙️ لوحة التحكم</h2><p>إدارة المنصة بالكامل</p><span class="status-badge status-admin">أدمن</span></div>
                <div class="stats-grid"><div class="stat-card"><div class="value" id="aStudents">0</div><div class="label">طلاب</div></div><div class="stat-card"><div class="value" id="aTeachers">0</div><div class="label">مدرسين</div></div><div class="stat-card"><div class="value" id="aPending">0</div><div class="label">بانتظار الموافقة</div></div></div>
                <div class="section-card"><h3>⏳ مدرسين بانتظار الموافقة</h3><div id="pendingTeachers"></div></div>
                <div class="section-card"><h3>🎓 الطلاب</h3><div id="allStudents"></div></div>
                <div class="section-card"><h3>👨‍🏫 المدرسين المعتمدين</h3><div id="approvedTeachers"></div></div>`;
            loadAdminStats(); loadPendingTeachers(); loadAllStudents(); loadApprovedTeachers();
        }

        function loadAdminStats() {
            const users = DB.getUsers();
            document.getElementById('aStudents').textContent = users.filter(u => u.role === 'student').length;
            document.getElementById('aTeachers').textContent = users.filter(u => u.role === 'teacher' && u.approved).length;
            document.getElementById('aPending').textContent = users.filter(u => u.role === 'teacher' && !u.approved).length;
        }

        function loadPendingTeachers() {
            const users = DB.getUsers().filter(u => u.role === 'teacher' && !u.approved);
            const container = document.getElementById('pendingTeachers');
            if (users.length === 0) { container.innerHTML = '<p class="no-results">لا يوجد طلبات</p>'; return; }
            container.innerHTML = '<table><tr><th>الاسم</th><th>المادة</th><th>البريد</th><th>إجراءات</th></tr>' + 
                users.map(u => `<tr><td>${u.fullName}</td><td>${u.subject || '-'}</td><td>${u.email}</td><td><button class="btn-small btn-approve" onclick="approveTeacher('${u.id}')">موافقة</button><button class="btn-small btn-reject" onclick="rejectTeacher('${u.id}')">رفض</button></td></tr>`).join('') + '</table>';
        }

        function loadAllStudents() {
            const users = DB.getUsers().filter(u => u.role === 'student');
            const container = document.getElementById('allStudents');
            if (users.length === 0) { container.innerHTML = '<p class="no-results">لا يوجد طلاب</p>'; return; }
            container.innerHTML = '<table><tr><th>الاسم</th><th>البريد</th><th>تاريخ التسجيل</th><th>إجراءات</th></tr>' + 
                users.map(u => `<tr><td>${u.fullName}</td><td>${u.email}</td><td>${u.createdAt ? new Date(u.createdAt).toLocaleDateString('ar-EG') : '-'}</td><td><button class="btn-small btn-delete" onclick="deleteUser('${u.id}')">حذف</button></td></tr>`).join('') + '</table>';
        }

        function loadApprovedTeachers() {
            const users = DB.getUsers().filter(u => u.role === 'teacher' && u.approved);
            const container = document.getElementById('approvedTeachers');
            if (users.length === 0) { container.innerHTML = '<p class="no-results">لا يوجد مدرسين</p>'; return; }
            container.innerHTML = '<table><tr><th>الاسم</th><th>المادة</th><th>التقييم</th><th>إجراءات</th></tr>' + 
                users.map(u => `<tr><td>${u.fullName}</td><td>${u.subject || '-'}</td><td>⭐ ${u.rating || 0}</td><td><button class="btn-small btn-delete" onclick="deleteUser('${u.id}')">حذف</button></td></tr>`).join('') + '</table>';
        }

        function approveTeacher(uid) {
            const users = DB.getUsers(), userIndex = users.findIndex(u => u.id === uid);
            if (userIndex > -1) {
                users[userIndex].approved = true; users[userIndex].status = 'active'; DB.saveUsers(users);
                const teachers = DB.getTeachers(), teacherIndex = teachers.findIndex(t => t.id === uid);
                if (teacherIndex > -1) { teachers[teacherIndex].approved = true; DB.saveTeachers(teachers); }
                else { teachers.push(users[userIndex]); DB.saveTeachers(teachers); }
                alert('تم الموافقة!'); loadAdminStats(); loadPendingTeachers(); loadApprovedTeachers();
            }
        }

        function rejectTeacher(uid) {
            if (!confirm('هل أنت متأكد؟')) return;
            const users = DB.getUsers().filter(u => u.id !== uid); DB.saveUsers(users);
            const teachers = DB.getTeachers().filter(t => t.id !== uid); DB.saveTeachers(teachers);
            alert('تم الرفض'); loadAdminStats(); loadPendingTeachers();
        }

        function deleteUser(uid) {
            if (!confirm('هل أنت متأكد من الحذف؟')) return;
            const users = DB.getUsers().filter(u => u.id !== uid); DB.saveUsers(users);
            const teachers = DB.getTeachers().filter(t => t.id !== uid); DB.saveTeachers(teachers);
            alert('تم الحذف'); loadAdminStats(); loadAllStudents(); loadApprovedTeachers();
        }

        function getRegionName(code) {
            const regions = {cairo:'القاهرة',alex:'الإسكندرية',giza:'الجيزة',mansoura:'المنصورة',tanta:'طنطا',online:'أونلاين'};
            return regions[code] || code;
        }

        checkAuth();
        console.log('%cمنصة ثورة تعليمية','font-size:24px;font-weight:bold;color:#1a237e');
        console.log('%cLocal Database - بيانات أولية جاهزة','font-size:14px;color:#666');
    </script>
</body>
</html>
