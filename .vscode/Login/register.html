<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - منصة ثورة تعليمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#1a237e 0%,#3949ab 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .register-box{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:450px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .register-box h1{color:#1a237e;text-align:center;margin-bottom:10px;font-size:1.8rem}
        .register-box .subtitle{color:#666;text-align:center;margin-bottom:30px;font-size:0.95rem}
        .form-group{margin-bottom:20px}
        .form-group label{display:block;color:#333;font-weight:600;margin-bottom:8px;font-size:0.95rem}
        .form-group input,.form-group select{width:100%;padding:14px 18px;border:2px solid #e0e0e0;border-radius:12px;font-size:1rem;font-family:'Cairo',sans-serif;transition:all 0.3s}
        .form-group input:focus,.form-group select:focus{outline:none;border-color:#1a237e;box-shadow:0 0 0 3px rgba(26,35,126,0.1)}
        .btn-register{background:linear-gradient(135deg,#1a237e 0%,#3949ab 100%);color:#fff;border:none;padding:16px;width:100%;border-radius:12px;font-size:1.1rem;font-family:'Cairo',sans-serif;font-weight:700;cursor:pointer;transition:all 0.3s;margin-top:10px}
        .btn-register:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(26,35,126,0.3)}
        .btn-register:disabled{opacity:0.6;cursor:not-allowed;transform:none}
        .login-link{text-align:center;margin-top:20px;color:#666}
        .login-link a{color:#1a237e;text-decoration:none;font-weight:700}
        .login-link a:hover{text-decoration:underline}
        .error{color:#f44336;font-size:0.85rem;margin-top:5px;display:none}
        .success{color:#4caf50;font-size:0.85rem;margin-top:5px;display:none}
        .loading{display:none;text-align:center;margin-top:15px}
        .spinner{width:30px;height:30px;border:3px solid #e0e0e0;border-top-color:#1a237e;border-radius:50%;animation:spin 1s linear infinite;display:inline-block}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
<base target="_blank">
</head>
<body>
    <div class="register-box">
        <h1>📚 إنشاء حساب جديد</h1>
        <p class="subtitle">انضم لمنصة ثورة تعليمية مجاناً</p>

        <form id="registerForm">
            <div class="form-group">
                <label>الاسم الكامل</label>
                <input type="text" id="fullName" placeholder="اكتب اسمك الكامل" required>
            </div>

            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="example@email.com" required>
            </div>

            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" placeholder="6 أحرف على الأقل" required minlength="6">
            </div>

            <div class="form-group">
                <label>نوع الحساب</label>
                <select id="role" required>
                    <option value="">-- اختر نوع الحساب --</option>
                    <option value="student">🎓 طالب</option>
                    <option value="teacher">👨‍🏫 مدرس</option>
                </select>
            </div>

            <!-- حقول إضافية للمدرسين -->
            <div class="form-group" id="teacherFields" style="display:none">
                <label>المادة التي تدرسها</label>
                <select id="subject">
                    <option value="">-- اختر المادة --</option>
                    <option value="رياضيات">رياضيات</option>
                    <option value="فيزياء">فيزياء</option>
                    <option value="كيمياء">كيمياء</option>
                    <option value="أحياء">أحياء</option>
                    <option value="تاريخ">تاريخ</option>
                    <option value="جغرافيا">جغرافيا</option>
                    <option value="فلسفة">فلسفة</option>
                    <option value="علم نفس">علم نفس</option>
                </select>
            </div>

            <div class="form-group" id="teacherFields2" style="display:none">
                <label>رابط قناة YouTube (اختياري)</label>
                <input type="url" id="youtubeChannel" placeholder="https://youtube.com/channel/...">
            </div>

            <button type="submit" class="btn-register" id="btnRegister">إنشاء حساب</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top:10px;color:#666">جاري إنشاء الحساب...</p>
            </div>

            <div class="error" id="errorMsg"></div>
            <div class="success" id="successMsg"></div>
        </form>

        <div class="login-link">
            عندك حساب بالفعل؟ <a href="login.html">سجل دخول من هنا</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        // Show/hide teacher fields
        document.getElementById('role').addEventListener('change', function() {
            const teacherFields = document.getElementById('teacherFields');
            const teacherFields2 = document.getElementById('teacherFields2');
            if (this.value === 'teacher') {
                teacherFields.style.display = 'block';
                teacherFields2.style.display = 'block';
            } else {
                teacherFields.style.display = 'none';
                teacherFields2.style.display = 'none';
            }
        });

        // Register form
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const subject = document.getElementById('subject').value;
            const youtubeChannel = document.getElementById('youtubeChannel').value;

            const btn = document.getElementById('btnRegister');
            const loading = document.getElementById('loading');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            btn.disabled = true;
            loading.style.display = 'block';
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            try {
                // Create user in Firebase Auth
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Save user data in Firestore
                const userData = {
                    uid: user.uid,
                    fullName: fullName,
                    email: email,
                    role: role,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    status: role === 'teacher' ? 'pending' : 'active' // Teachers need approval
                };

                // Add teacher-specific data
                if (role === 'teacher') {
                    userData.subject = subject;
                    userData.youtubeChannel = youtubeChannel || '';
                    userData.rating = 0;
                    userData.students = 0;
                    userData.experience = '';
                    userData.approved = false;
                }

                // Add student-specific data
                if (role === 'student') {
                    userData.year = '';
                    userData.branch = '';
                    userData.favoriteTeachers = [];
                }

                await db.collection('users').doc(user.uid).set(userData);

                // Update profile
                await user.updateProfile({ displayName: fullName });

                successMsg.textContent = role === 'teacher' 
                    ? 'تم إنشاء الحساب! بانتظار موافقة الأدmin...' 
                    : 'تم إنشاء الحساب بنجاح! جاري التوجيه...';
                successMsg.style.display = 'block';

                // Redirect after 2 seconds
                setTimeout(() => {
                    if (role === 'student') {
                        window.location.href = 'student.html';
                    } else if (role === 'teacher') {
                        window.location.href = 'teacher.html';
                    }
                }, 2000);

            } catch (error) {
                errorMsg.textContent = getErrorMessage(error.code);
                errorMsg.style.display = 'block';
                btn.disabled = false;
                loading.style.display = 'none';
            }
        });

        function getErrorMessage(code) {
            const errors = {
                'auth/email-already-in-use': 'البريد الإلكتروني مستخدم بالفعل',
                'auth/invalid-email': 'بريد إلكتروني غير صحيح',
                'auth/weak-password': 'كلمة المرور ضعيفة (6 أحرف على الأقل)',
                'auth/network-request-failed': 'مشكلة في الاتصال بالإنترنت'
            };
            return errors[code] || 'حدث خطأ، جرب مرة أخرى';
        }
    </script>
</body>
</html>
